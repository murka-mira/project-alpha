<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1a2a4a"/>

  <!-- Ears -->
  <polygon points="6,18 9,8 14,18" fill="#f9c0e0"/>
  <polygon points="18,18 23,8 26,18" fill="#f9c0e0"/>
  <!-- Ear outline -->
  <polygon points="6,18 9,8 14,18" fill="none" stroke="#222" stroke-width="1.2" stroke-linejoin="round"/>
  <polygon points="18,18 23,8 26,18" fill="none" stroke="#222" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Inner ear -->
  <polygon points="8,17 10,10 13,17" fill="#f07ab0"/>
  <polygon points="19,17 22,10 25,17" fill="#f07ab0"/>

  <!-- Head -->
  <circle cx="16" cy="21" r="10" fill="#f9c0e0"/>
  <circle cx="16" cy="21" r="10" fill="none" stroke="#222" stroke-width="1.4"/>

  <!-- Eyes -->
  <ellipse cx="12" cy="20" rx="2.2" ry="2.5" fill="#222"/>
  <ellipse cx="20" cy="20" rx="2.2" ry="2.5" fill="#222"/>
  <!-- Shine dots -->
  <circle cx="12.8" cy="19" r="0.8" fill="white"/>
  <circle cx="20.8" cy="19" r="0.8" fill="white"/>

  <!-- Nose -->
  <polygon points="16,23 14.5,24.4 17.5,24.4" fill="#f07ab0" stroke="#222" stroke-width="0.6" stroke-linejoin="round"/>

  <!-- Mouth -->
  <path d="M14.5 24.5 Q16 26 17.5 24.5" stroke="#222" stroke-width="0.9" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="6"  y1="22" x2="13" y2="22.5" stroke="#222" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="6"  y1="24" x2="13" y2="23.5" stroke="#222" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="19" y1="22.5" x2="26" y2="22"  stroke="#222" stroke-width="0.7" stroke-linecap="round"/>
  <line x1="19" y1="23.5" x2="26" y2="24"  stroke="#222" stroke-width="0.7" stroke-linecap="round"/>
</svg>
